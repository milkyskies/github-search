version: 2
updates:
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    commit-message:
      prefix: "chore"
      include: "scope"
    labels:
      - "dependencies"
    cooldown:
      default-days: 1 # zizmor: ignore[dependabot-cooldown]
      semver-major-days: 1
      semver-minor-days: 1
      semver-patch-days: 1

  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
    commit-message:
      prefix: "chore"
      include: "scope"
    labels:
      - "dependencies"
    open-pull-requests-limit: 5
    groups:
      react:
        patterns:
          - "react"
          - "react-dom"
          - "@types/react"
          - "@types/react-dom"
      next:
        patterns:
          - "next"
          - "next-intl"
          - "next-themes"
      biome:
        patterns:
          - "@biomejs/*"
          - "@milkyskies/biome-config"
      tailwind:
        patterns:
          - "tailwindcss"
          - "@tailwindcss/*"
          - "tailwind-merge"
      vite:
        patterns:
          - "vite"
          - "@vitejs/*"
          - "vite-tsconfig-paths"
      storybook:
        patterns:
          - "storybook"
          - "@storybook/*"
      testing:
        patterns:
          - "vitest"
          - "@vitest/*"
          - "@testing-library/*"
          - "@playwright/test"
          - "msw"
          - "jsdom"
    cooldown:
      default-days: 1 # zizmor: ignore[dependabot-cooldown]
      semver-major-days: 1
      semver-minor-days: 1
      semver-patch-days: 1
